# Test profile — overrides for CI and local test runs
spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/projectbourne_test}
    username: ${TEST_DB_USERNAME:postgres}
    password: ${TEST_DB_PASSWORD:postgres}
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

jwt:
  private-key: 
  public-key: 
  expiration-seconds: 3600

logging:
  level:
    root: WARN
    com.projectbourne: DEBUG
