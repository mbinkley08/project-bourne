server:
  port: 8080

spring:
  application:
    name: project-bourne-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/projectbourne}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,email,profile

# Actuator — health and info exposed; metrics available but auth-gated in prod
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# AI service internal URL — never exposed to clients
ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000}

# JWT — RS256 signing. Keys stored as base64-encoded DER (no PEM headers).
# Private key: signs tokens. Never distributed. AWS Secrets Manager in production.
# Public key: verifies tokens. AWS Secrets Manager in production.
jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# Structured JSON logging for observability
logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","logger":"%c{1}","message":"%m"}%n'
