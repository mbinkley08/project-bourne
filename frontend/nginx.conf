server {
    listen 80;

    # Serve React SPA — all unknown paths fall back to index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Health check — returns static JSON, no app dependency
    location /health {
        return 200 '{"status":"ok","service":"frontend"}';
        add_header Content-Type application/json;
    }

    # Proxy /api to Core API — frontend never calls AI service directly
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
